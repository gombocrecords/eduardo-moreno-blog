backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: posts
    label: Artículos
    folder: content/posts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título",    name: "title",    widget: "string" }
      - { label: "Fecha",     name: "date",     widget: "datetime" }
      - { label: "Categoría", name: "category", widget: "select", options: ["Movilidad", "Logística", "Infraestructura", "Noticias"] }
      - { label: "Resumen",   name: "excerpt",  widget: "string" }
      - { label: "Destacado", name: "featured", widget: "boolean", default: false }
      - { label: "Imagen",    name: "image",    widget: "image",   required: false }
      - { label: "Contenido", name: "body",     widget: "markdown" }
