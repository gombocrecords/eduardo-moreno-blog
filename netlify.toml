[build]
  command   = "npm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect /admin to the CMS
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

# SPA fallback for static export
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[context.production.environment]
  NEXT_PUBLIC_SITE_URL = "https://tu-sitio.netlify.app"
